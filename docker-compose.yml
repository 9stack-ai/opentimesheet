services:
  db:
    image: postgres:17
    container_name: 9stimesheet-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: app
      POSTGRES_PASSWORD: app_pw
      POSTGRES_DB: timesheet
    ports:
      - "5433:5432"
    volumes:
      - 9stimesheet_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U app -d timesheet"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  9stimesheet_pgdata:
