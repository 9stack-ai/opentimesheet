<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" fill="none" role="img" aria-label="9stimesheet logo">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="100" y2="100" gradientUnits="userSpaceOnUse">
      <stop stop-color="#10B981"/>
      <stop offset="1" stop-color="#047857"/>
    </linearGradient>
  </defs>
  <rect width="100" height="100" rx="23" fill="url(#bg)"/>
  <g stroke="#ffffff" stroke-linecap="round" stroke-linejoin="round">
    <!-- loop of the "9" doubling as a clock face -->
    <circle cx="45" cy="41" r="19" stroke-width="10"/>
    <!-- tail of the "9" -->
    <path d="M61 50 C 63 64, 56 74, 46 82" stroke-width="10" fill="none"/>
    <!-- clock hands -->
    <path d="M45 41 L45 29" stroke-width="5.5"/>
    <path d="M45 41 L55 45" stroke-width="5.5"/>
  </g>
  <circle cx="45" cy="41" r="3.2" fill="#ffffff"/>
</svg>
